server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Proxy all /api/ calls to the backend container ──────────────────────
    # In Docker Compose, containers reach each other by service name.
    # The browser sends requests to localhost:8080/api/..., nginx forwards
    # them to http://backend:3001/api/... internally.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies (needed for auth_token httpOnly cookie)
        proxy_pass_header  Set-Cookie;

        # Timeouts for long-running imports
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── SPA fallback — all non-file routes go to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache busting for hashed assets ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── No caching for index.html ────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
